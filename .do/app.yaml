alerts:
- rule: DEPLOYMENT_FAILED
- rule: DOMAIN_FAILED
domains:
- domain: k5m.sh
  type: PRIMARY
ingress:
  rules:
  - component:
      name: k5m-sh
    match:
      authority: {}
      path:
        prefix: /
name: k5m-sh-frontend
region: nyc
services:
- dockerfile_path: Dockerfile
  github:
    branch: main
    deploy_on_push: true
    repo: khayyamsaleem/k5m.sh
  http_port: 8080
  instance_count: 1
  instance_size_slug: apps-s-1vcpu-0.5gb
  name: k5m-sh
  source_dir: /
