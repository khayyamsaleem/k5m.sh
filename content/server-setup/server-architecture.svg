  <rect x="58" y="566" width="210" height="24" rx="3" fill="#1c2128" stroke="#58a6ff" stroke-width="0.7"/>
  <text x="163" y="582" text-anchor="middle" class="port">:9100 --> node-exporter</text>

  <rect x="280" y="566" width="210" height="24" rx="3" fill="#1c2128" stroke="#58a6ff" stroke-width="0.7"/>
  <text x="385" y="582" text-anchor="middle" class="port">:9101 --> cAdvisor</text>

  <rect x="502" y="566" width="222" height="24" rx="3" fill="#1c2128" stroke="#58a6ff" stroke-width="0.7"/>
  <text x="613" y="582" text-anchor="middle" class="port">:9594 --> jellyfin-exporter</text>

  <rect x="58" y="596" width="210" height="24" rx="3" fill="#1c2128" stroke="#58a6ff" stroke-width="0.7"/>
  <text x="163" y="612" text-anchor="middle" class="port">:9901 --> envoy</text>

  <rect x="280" y="596" width="210" height="24" rx="3" fill="#1c2128" stroke="#58a6ff" stroke-width="0.7"/>
  <text x="385" y="612" text-anchor="middle" class="port">:19091 --> transmission-exporter</text>

  <rect x="502" y="596" width="222" height="24" rx="3" fill="#1c2128" stroke="#30363d"/>
  <text x="613" y="612" text-anchor="middle" class="t">Watchtower</text>

  <!-- STACK: media -->
  <rect x="35" y="656" width="350" height="82" rx="5" fill="none" stroke="#21262d" stroke-width="1"/>
  <text x="48" y="670" class="stack">media</text>

  <rect x="45" y="678" width="160" height="40" rx="3" fill="#1c2128" stroke="#30363d"/>
  <text x="125" y="698" text-anchor="middle" class="t">Jellyfin</text>
  <text x="125" y="712" text-anchor="middle" class="port">LAN :8096</text>

  <rect x="215" y="678" width="160" height="40" rx="3" fill="#1c2128" stroke="#30363d"/>
  <text x="295" y="698" text-anchor="middle" class="t">jellyfin-exporter</text>

  <!-- STACK: torrenting -->
  <rect x="395" y="656" width="350" height="82" rx="5" fill="none" stroke="#21262d" stroke-width="1"/>
  <text x="408" y="670" class="stack">torrenting</text>

  <!-- Mullvad VPN tunnel envelope around Gluetun+Transmission -->
  <rect x="402" y="675" width="240" height="56" rx="4" fill="#f0883e" fill-opacity="0.06" stroke="#f0883e" stroke-width="0.8" stroke-dasharray="4 2"/>
  <text x="640" y="685" fill="#f0883e" class="sub" font-size="8">Mullvad VPN</text>
  <text x="640" y="695" fill="#f0883e" class="sub" font-size="8">WireGuard tunnel</text>

  <rect x="408" y="681" width="110" height="44" rx="3" fill="#1c2128" stroke="#30363d"/>
  <text x="463" y="703" text-anchor="middle" class="t">Gluetun</text>
  <text x="463" y="717" text-anchor="middle" class="sub">kill switch</text>

  <rect x="525" y="681" width="110" height="44" rx="3" fill="#1c2128" stroke="#30363d"/>
  <text x="580" y="703" text-anchor="middle" class="t">Transmission</text>
  <text x="580" y="717" text-anchor="middle" class="port">:9091 · :51413</text>

  <rect x="645" y="706" width="92" height="26" rx="3" fill="#1c2128" stroke="#30363d"/>
  <text x="691" y="723" text-anchor="middle" class="t" font-size="9">tx-exporter</text>

  <!-- STACK: ai -->
  <rect x="35" y="748" width="350" height="56" rx="5" fill="none" stroke="#21262d" stroke-width="1"/>
  <text x="48" y="762" class="stack">ai</text>

  <rect x="45" y="770" width="100" height="26" rx="3" fill="#1c2128" stroke="#30363d"/>
  <text x="95" y="788" text-anchor="middle" class="t">Ollama</text>

  <rect x="155" y="770" width="100" height="26" rx="3" fill="#1c2128" stroke="#30363d"/>
  <text x="205" y="788" text-anchor="middle" class="t">Envoy</text>

  <rect x="265" y="770" width="110" height="26" rx="3" fill="#1c2128" stroke="#30363d"/>
  <text x="320" y="788" text-anchor="middle" class="t">PicoClaw</text>

  <!-- STACK: monitoring -->
  <rect x="395" y="748" width="350" height="56" rx="5" fill="none" stroke="#21262d" stroke-width="1"/>
  <text x="408" y="762" class="stack">monitoring</text>

  <rect x="405" y="770" width="100" height="26" rx="3" fill="#1c2128" stroke="#30363d"/>
  <text x="455" y="788" text-anchor="middle" class="t">node-exp.</text>

  <rect x="515" y="770" width="100" height="26" rx="3" fill="#1c2128" stroke="#30363d"/>
  <text x="565" y="788" text-anchor="middle" class="t">cAdvisor</text>

  <rect x="625" y="770" width="110" height="26" rx="3" fill="#1c2128" stroke="#30363d"/>
  <text x="680" y="788" text-anchor="middle" class="t" font-size="10">network-exp.*</text>

  <!-- Promtail in monitoring stack -->
  <rect x="35" y="814" width="350" height="42" rx="5" fill="none" stroke="#21262d" stroke-width="1"/>
  <text x="48" y="828" class="stack">logging (ships to juul)</text>

  <rect x="45" y="834" width="120" height="18" rx="3" fill="#1c2128" stroke="#30363d"/>
  <text x="105" y="847" text-anchor="middle" class="t" font-size="10">Promtail</text>

  <!-- footnote -->
  <text x="40" y="886" class="sub">* network-exporter uses host networking — scraped via host Tailscale IP</text>
  <text x="40" y="932" class="sub">Host Tailscale daemon (SSH, management, network-exporter scraping)</text>
</svg>
