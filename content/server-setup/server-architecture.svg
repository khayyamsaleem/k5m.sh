  <rect x="160" y="435" width="460" height="30" rx="15" fill="#58a6ff" fill-opacity="0.07" stroke="#58a6ff" stroke-width="0.8" stroke-dasharray="6 3"/>
  <text x="390" y="454" text-anchor="middle" class="tsl" font-size="12">Tailscale WireGuard tunnel</text>

  <line x1="340" y1="425" x2="340" y2="437" stroke="#58a6ff" stroke-width="1.8" stroke-dasharray="4 2"/>
  <line x1="340" y1="465" x2="340" y2="480" stroke="#58a6ff" stroke-width="1.8" stroke-dasharray="4 2" marker-end="url(#arr-b)"/>
  <line x1="440" y1="480" x2="440" y2="465" stroke="#58a6ff" stroke-width="1.8" stroke-dasharray="4 2" marker-end="url(#arr-b)"/>
  <line x1="440" y1="437" x2="440" y2="425" stroke="#58a6ff" stroke-width="1.8" stroke-dasharray="4 2"/>

  <text x="322" y="422" text-anchor="end" fill="#3fb950" class="sub" font-size="9">metrics</text>
  <text x="458" y="422" fill="#3fb950" class="sub" font-size="9">logs</text>

  <!-- Reverse proxy: Traefik -> tunnel -> Jellyfin -->
  <path d="M 105 162 L 105 400 Q 105 415 120 420 L 155 437" stroke="#d2a8ff" stroke-width="1.5" fill="none" stroke-dasharray="3 2"/>
  <path d="M 155 465 L 125 678" stroke="#d2a8ff" stroke-width="1.5" fill="none" stroke-dasharray="3 2" marker-end="url(#arr-p)"/>
  <text x="68" y="395" fill="#d2a8ff" class="sub" font-size="9">jelly.</text>
  <text x="68" y="405" fill="#d2a8ff" class="sub" font-size="9">khayyam.me</text>

  <!-- Reverse proxy: Traefik -> tunnel -> Transmission -->
  <path d="M 130 162 L 130 395 Q 130 410 150 415 L 545 437" stroke="#d2a8ff" stroke-width="1.5" fill="none" stroke-dasharray="3 2"/>
  <path d="M 545 465 L 545 678" stroke="#d2a8ff" stroke-width="1.5" fill="none" stroke-dasharray="3 2" marker-end="url(#arr-p)"/>
  <text x="600" y="420" fill="#d2a8ff" class="sub" font-size="9">transmission.khayyam.me</text>

