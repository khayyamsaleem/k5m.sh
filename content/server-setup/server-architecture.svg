  <rect x="20" y="485" width="740" height="475" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="40" y="510" class="nt">cherryblossom</text>
  <text x="185" y="510" class="sub" font-size="11">on-prem · Arch Linux · NVIDIA GPU</text>

  <!-- STACK: infra -->
  <rect x="35" y="520" width="710" height="126" rx="5" fill="none" stroke="#21262d" stroke-width="1"/>
  <text x="48" y="534" class="stack">infra</text>

