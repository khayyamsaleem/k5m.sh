  <line x1="586" y1="156" x2="614" y2="156" stroke="#d2a8ff" stroke-width="1.5" stroke-dasharray="3 2"/>
  <text x="620" y="160" class="sub">Reverse proxy traffic</text>
  <line x1="586" y1="172" x2="614" y2="172" stroke="#f0883e" stroke-width="1.5" stroke-dasharray="4 2"/>
  <text x="620" y="176" class="sub">Mullvad VPN tunnel</text>
  <rect x="586" y="182" width="24" height="8" rx="2" fill="none" stroke="#58a6ff" stroke-width="0.7" stroke-dasharray="3 1.5"/>
  <text x="620" y="190" class="sub">TS_SERVE_CONFIG</text>

  <text x="40" y="396" class="sub">Host Tailscale daemon (SSH, management)</text>

