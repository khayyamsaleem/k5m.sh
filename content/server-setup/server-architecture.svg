<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 720" font-family="'SF Mono', 'Fira Code', 'Cascadia Code', monospace">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#555"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0087ff"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#22c55e"/>
    </marker>
    <linearGradient id="ts-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0087ff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0087ff" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <style>
    text { font-size: 12px; fill: #e0e0e0; }
    .title { font-size: 14px; font-weight: bold; fill: #ffffff; }
    .subtitle { font-size: 11px; fill: #888; }
    .port { font-size: 10px; fill: #0087ff; }
    .label { font-size: 11px; fill: #aaa; }
    .node-title { font-size: 16px; font-weight: bold; }
    .ts-label { font-size: 12px; font-weight: bold; fill: #0087ff; }
  </style>

  <!-- Background -->
  <rect width="900" height="720" rx="12" fill="#0d1117"/>

  <!-- Internet -->
  <text x="450" y="30" text-anchor="middle" class="label" font-size="13">Internet</text>
  <line x1="450" y1="36" x2="450" y2="58" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ==================== JUUL NODE ==================== -->
  <rect x="30" y="60" width="410" height="340" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="50" y="85" class="node-title" fill="#e0e0e0">juul</text>
  <text x="100" y="85" class="subtitle"> DigitalOcean VPS</text>

  <!-- Tailscale container (juul-docker) -->
  <rect x="50" y="100" width="370" height="80" rx="6" fill="url(#ts-grad)" stroke="#0087ff" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="65" y="120" class="ts-label">juul-docker</text>
  <text x="175" y="120" class="subtitle">Tailscale container</text>

  <!-- Traefik inside TS -->
  <rect x="65" y="130" width="90" height="36" rx="4" fill="#1c2128" stroke="#30363d"/>
  <text x="110" y="153" text-anchor="middle" class="title">Traefik</text>

  <!-- Loki forward -->
  <rect x="170" y="130" width="120" height="36" rx="4" fill="#1c2128" stroke="#0087ff" stroke-width="0.8"/>
  <text x="230" y="148" text-anchor="middle" class="port">TCP :3100</text>
  <text x="230" y="161" text-anchor="middle" class="subtitle">--> Loki</text>

  <!-- Services row 1 -->
  <rect x="50" y="195" width="110" height="36" rx="4" fill="#1c2128" stroke="#30363d"/>
  <text x="105" y="218" text-anchor="middle" class="title">Loki</text>

  <rect x="175" y="195" width="110" height="36" rx="4" fill="#1c2128" stroke="#30363d"/>
  <text x="230" y="218" text-anchor="middle" class="title">VictoriaMetrics</text>

  <rect x="300" y="195" width="110" height="36" rx="4" fill="#1c2128" stroke="#30363d"/>
  <text x="355" y="218" text-anchor="middle" class="title">Grafana</text>

  <!-- Services row 2 -->
  <rect x="50" y="245" width="110" height="36" rx="4" fill="#1c2128" stroke="#30363d"/>
  <text x="105" y="268" text-anchor="middle" class="title">Jenkins</text>

  <rect x="175" y="245" width="110" height="36" rx="4" fill="#1c2128" stroke="#30363d"/>
  <text x="230" y="268" text-anchor="middle" class="title">OTel Collector</text>

  <rect x="300" y="245" width="110" height="36" rx="4" fill="#1c2128" stroke="#30363d"/>
  <text x="355" y="268" text-anchor="middle" class="title">Promtail</text>

  <!-- Services row 3 -->
  <rect x="50" y="300" width="170" height="36" rx="4" fill="#1c2128" stroke="#30363d"/>
  <text x="135" y="323" text-anchor="middle" class="title">node-exporter, cAdvisor</text>

  <rect x="235" y="300" width="175" height="36" rx="4" fill="#1c2128" stroke="#30363d"/>
  <text x="322" y="323" text-anchor="middle" class="title">tailscale-exporter</text>

  <!-- Juul host Tailscale label -->
  <text x="50" y="370" class="subtitle">Host Tailscale daemon (SSH, management)</text>

  <!-- ==================== CHERRYBLOSSOM NODE ==================== -->
  <rect x="30" y="420" width="840" height="280" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="50" y="448" class="node-title" fill="#e0e0e0">cherryblossom</text>
  <text x="195" y="448" class="subtitle"> on-prem (Arch Linux, NVIDIA GPU)</text>

  <!-- Tailscale container (cherryblossom-docker) -->
  <rect x="50" y="460" width="370" height="140" rx="6" fill="url(#ts-grad)" stroke="#0087ff" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="65" y="480" class="ts-label">cherryblossom-docker</text>
  <text x="250" y="480" class="subtitle">Tailscale container</text>

  <!-- TCP forwards -->
  <rect x="65" y="490" width="160" height="24" rx="3" fill="#1c2128" stroke="#0087ff" stroke-width="0.8"/>
  <text x="145" y="506" text-anchor="middle" class="port">:9100 --> node-exporter</text>

  <rect x="235" y="490" width="170" height="24" rx="3" fill="#1c2128" stroke="#0087ff" stroke-width="0.8"/>
  <text x="320" y="506" text-anchor="middle" class="port">:9101 --> cAdvisor</text>

  <rect x="65" y="520" width="160" height="24" rx="3" fill="#1c2128" stroke="#0087ff" stroke-width="0.8"/>
  <text x="145" y="536" text-anchor="middle" class="port">:9594 --> jellyfin-exporter</text>

  <rect x="235" y="520" width="170" height="24" rx="3" fill="#1c2128" stroke="#0087ff" stroke-width="0.8"/>
  <text x="320" y="536" text-anchor="middle" class="port">:9901 --> envoy</text>

  <rect x="65" y="550" width="340" height="24" rx="3" fill="#1c2128" stroke="#0087ff" stroke-width="0.8"/>
  <text x="235" y="566" text-anchor="middle" class="port">:19091 --> transmission-exporter</text>

  <!-- Cherryblossom services -->
  <rect x="460" y="460" width="130" height="40" rx="4" fill="#1c2128" stroke="#30363d"/>
  <text x="525" y="483" text-anchor="middle" class="title">Jellyfin</text>
  <text x="525" y="496" text-anchor="middle" class="port">LAN :8096</text>

  <rect x="600" y="460" width="130" height="40" rx="4" fill="#1c2128" stroke="#30363d"/>
  <text x="665" y="483" text-anchor="middle" class="title">Ollama (GPU)</text>
  <text x="665" y="496" text-anchor="middle" class="subtitle">+ Envoy + PicoClaw</text>

  <rect x="460" y="510" width="130" height="40" rx="4" fill="#1c2128" stroke="#30363d"/>
  <text x="525" y="528" text-anchor="middle" class="title">Gluetun</text>
  <text x="525" y="541" text-anchor="middle" class="subtitle">NordVPN WireGuard</text>

  <rect x="600" y="510" width="130" height="40" rx="4" fill="#1c2128" stroke="#30363d"/>
  <text x="665" y="533" text-anchor="middle" class="title">Transmission</text>

  <rect x="460" y="560" width="130" height="40" rx="4" fill="#1c2128" stroke="#30363d"/>
  <text x="525" y="583" text-anchor="middle" class="title">Promtail</text>

  <rect x="600" y="560" width="270" height="40" rx="4" fill="#1c2128" stroke="#30363d"/>
  <text x="735" y="583" text-anchor="middle" class="title">node-exporter, cAdvisor, network-exporter</text>

  <!-- Exporters row -->
  <rect x="460" y="610" width="270" height="36" rx="4" fill="#1c2128" stroke="#30363d"/>
  <text x="595" y="633" text-anchor="middle" class="title">jellyfin-exporter, transmission-exporter</text>

  <!-- Host Tailscale label -->
  <text x="50" y="670" class="subtitle">Host Tailscale daemon (SSH, management, network-exporter scraping)</text>

  <!-- ==================== TAILSCALE TUNNEL ==================== -->
  <!-- Main tunnel between TS containers -->
  <path d="M 235 180 L 235 390 Q 235 410 245 420 L 245 460" stroke="#0087ff" stroke-width="2.5" fill="none" stroke-dasharray="6 3" marker-end="url(#arrow-blue)"/>
  <path d="M 265 460 L 265 420 Q 265 410 275 400 L 275 180" stroke="#0087ff" stroke-width="2.5" fill="none" stroke-dasharray="6 3" marker-end="url(#arrow-blue)"/>

  <!-- Tunnel label -->
  <rect x="455" y="388" width="200" height="24" rx="4" fill="#0087ff" fill-opacity="0.12"/>
  <text x="555" y="404" text-anchor="middle" class="ts-label" font-size="13">Tailscale WireGuard tunnel</text>

  <!-- Promtail to juul-docker Loki arrow -->
  <path d="M 525 560 L 525 415 Q 525 400 510 395 L 290 395 Q 275 395 270 385 L 270 180" stroke="#22c55e" stroke-width="1.5" fill="none" stroke-dasharray="4 2" marker-end="url(#arrow-green)"/>
  <text x="410" y="388" text-anchor="middle" class="label" fill="#22c55e" font-size="10">logs</text>

  <!-- VM scraping arrow -->
  <path d="M 240 231 L 240 390 Q 240 410 250 420 L 250 460" stroke="#f59e0b" stroke-width="1.5" fill="none" stroke-dasharray="4 2" marker-end="url(#arrow)"/>
  <text x="210" y="388" text-anchor="end" class="label" fill="#f59e0b" font-size="10">scrapes</text>

  <!-- Internet to Traefik -->
  <line x1="450" y1="58" x2="350" y2="58" stroke="#555" stroke-width="1"/>
  <line x1="350" y1="58" x2="350" y2="95" stroke="#555" stroke-width="1"/>
  <path d="M 350 95 L 350 100 Q 350 110 340 115 L 160 130" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Legend -->
  <rect x="500" y="60" width="360" height="100" rx="6" fill="#161b22" stroke="#30363d"/>
  <text x="520" y="82" class="title" font-size="12">Legend</text>
  <line x1="520" y1="98" x2="558" y2="98" stroke="#0087ff" stroke-width="2" stroke-dasharray="6 3"/>
  <text x="565" y="102" class="label" font-size="11">Tailscale container tunnel</text>
  <line x1="520" y1="118" x2="558" y2="118" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="4 2"/>
  <text x="565" y="122" class="label" font-size="11">Log forwarding (Promtail --> Loki)</text>
  <line x1="520" y1="138" x2="558" y2="138" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4 2"/>
  <text x="565" y="142" class="label" font-size="11">Metrics scraping (VictoriaMetrics)</text>
  <rect x="726" y="90" width="50" height="16" rx="3" fill="none" stroke="#0087ff" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="783" y="102" class="label" font-size="11">TS_SERVE_CONFIG</text>
</svg>
