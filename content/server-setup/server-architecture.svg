<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 1200" font-family="'SF Mono', 'Fira Code', 'Cascadia Code', monospace">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#8b949e"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#1a7f37"/>
    </marker>
    <marker id="arr-p" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#8250df"/>
    </marker>
    <linearGradient id="tsg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0969da" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#0969da" stop-opacity="0.02"/>
    </linearGradient>
  </defs>

  <style>
    text { font-size: 12px; fill: #24292f; }
    .t { font-size: 13px; font-weight: bold; fill: #24292f; }
    .sub { font-size: 10.5px; fill: #656d76; }
    .port { font-size: 10.5px; fill: #0969da; }
    .nt { font-size: 16px; font-weight: bold; fill: #24292f; }
    .tsl { font-size: 12px; font-weight: bold; fill: #0969da; }
    .stack { font-size: 9.5px; fill: #8b949e; text-transform: uppercase; letter-spacing: 1.2px; }
    .lane { font-size: 10px; font-weight: bold; letter-spacing: 0.5px; }
  </style>

  <!-- background -->
  <rect width="1100" height="1200" rx="10" fill="#ffffff"/>

  <!-- Internet -->
  <text x="550" y="26" text-anchor="middle" fill="#656d76" font-size="13">Internet</text>
  <line x1="550" y1="33" x2="550" y2="56" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ======================== JUUL ======================== -->
  <rect x="24" y="62" width="1052" height="430" rx="8" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1"/>
  <text x="48" y="90" class="nt">juul</text>
  <text x="98" y="90" class="sub" font-size="12">DigitalOcean VPS</text>

  <!-- STACK: networking -->
  <rect x="40" y="104" width="490" height="108" rx="6" fill="none" stroke="#d0d7de" stroke-width="1"/>
  <text x="56" y="120" class="stack">networking</text>

  <!-- juul-docker Tailscale container -->
  <rect x="52" y="128" width="468" height="74" rx="5" fill="url(#tsg)" stroke="#0969da" stroke-width="0.8" stroke-dasharray="4 2"/>
  <text x="68" y="148" class="tsl">juul-docker</text>
  <text x="170" y="148" class="sub">Tailscale container</text>

  <rect x="68" y="158" width="140" height="34" rx="4" fill="#ffffff" stroke="#d0d7de"/>
  <text x="138" y="180" text-anchor="middle" class="t">Traefik</text>

  <rect x="222" y="158" width="284" height="34" rx="4" fill="#ffffff" stroke="#0969da" stroke-width="0.7"/>
  <text x="364" y="172" text-anchor="middle" class="port">TCP :3100 → Loki  :8428 → VM</text>
  <text x="364" y="185" text-anchor="middle" class="sub">log + metric ingestion from cherryblossom</text>

  <!-- STACK: monitoring -->
  <rect x="40" y="224" width="730" height="108" rx="6" fill="none" stroke="#d0d7de" stroke-width="1"/>
  <text x="56" y="240" class="stack">monitoring</text>

  <rect x="56" y="250" width="190" height="36" rx="4" fill="#ffffff" stroke="#d0d7de"/>
  <text x="151" y="273" text-anchor="middle" class="t">VictoriaMetrics</text>

  <rect x="260" y="250" width="140" height="36" rx="4" fill="#ffffff" stroke="#d0d7de"/>
  <text x="330" y="273" text-anchor="middle" class="t">Grafana</text>

  <rect x="414" y="250" width="130" height="36" rx="4" fill="#ffffff" stroke="#d0d7de"/>
  <text x="479" y="273" text-anchor="middle" class="t">node-exp.</text>

  <rect x="558" y="250" width="130" height="36" rx="4" fill="#ffffff" stroke="#d0d7de"/>
  <text x="623" y="273" text-anchor="middle" class="t">cAdvisor</text>

  <rect x="56" y="294" width="190" height="30" rx="4" fill="#ffffff" stroke="#d0d7de"/>
  <text x="151" y="314" text-anchor="middle" class="t">tailscale-exporter</text>

  <!-- STACK: logging -->
  <rect x="40" y="344" width="340" height="60" rx="6" fill="none" stroke="#d0d7de" stroke-width="1"/>
  <text x="56" y="360" class="stack">logging</text>

  <rect x="56" y="370" width="140" height="28" rx="4" fill="#ffffff" stroke="#d0d7de"/>
  <text x="126" y="389" text-anchor="middle" class="t">Loki</text>

  <rect x="210" y="370" width="155" height="28" rx="4" fill="#ffffff" stroke="#d0d7de"/>
  <text x="287" y="389" text-anchor="middle" class="t">Promtail</text>

  <!-- STACK: ci -->
  <rect x="396" y="344" width="374" height="60" rx="6" fill="none" stroke="#d0d7de" stroke-width="1"/>
  <text x="412" y="360" class="stack">ci</text>

  <rect x="412" y="370" width="155" height="28" rx="4" fill="#ffffff" stroke="#d0d7de"/>
  <text x="489" y="389" text-anchor="middle" class="t">Jenkins</text>

  <rect x="581" y="370" width="175" height="28" rx="4" fill="#ffffff" stroke="#d0d7de"/>
  <text x="668" y="389" text-anchor="middle" class="t">OTel Collector</text>

  <!-- Legend -->
  <rect x="810" y="104" width="250" height="130" rx="6" fill="#ffffff" stroke="#d0d7de"/>
  <text x="830" y="126" class="t" font-size="12">Legend</text>

  <line x1="830" y1="142" x2="862" y2="142" stroke="#0969da" stroke-width="2" stroke-dasharray="5 3"/>
  <text x="872" y="146" class="sub">Tailscale tunnel</text>

  <line x1="830" y1="160" x2="862" y2="160" stroke="#1a7f37" stroke-width="1.5" stroke-dasharray="3 2"/>
  <text x="872" y="164" class="sub">Metrics / Logs flow</text>

  <line x1="830" y1="178" x2="862" y2="178" stroke="#8250df" stroke-width="1.5" stroke-dasharray="3 2"/>
  <text x="872" y="182" class="sub">Reverse proxy traffic</text>

  <line x1="830" y1="196" x2="862" y2="196" stroke="#bc4c00" stroke-width="1.5" stroke-dasharray="4 2"/>
  <text x="872" y="200" class="sub">Mullvad VPN tunnel</text>

  <rect x="830" y="210" width="28" height="9" rx="2" fill="none" stroke="#0969da" stroke-width="0.7" stroke-dasharray="3 1.5"/>
  <text x="872" y="219" class="sub">TS_SERVE_CONFIG fwd</text>

  <text x="48" y="460" class="sub">Host Tailscale daemon (SSH, management)</text>

  <!-- ======================== TUNNEL ZONE ======================== -->
  <rect x="80" y="502" width="940" height="80" rx="40" fill="#0969da" fill-opacity="0.04" stroke="#0969da" stroke-width="0.8" stroke-dasharray="6 3"/>
  <text x="550" y="528" text-anchor="middle" class="tsl" font-size="13">Tailscale WireGuard tunnel</text>

  <!-- Traffic lane labels inside the tunnel -->
  <rect x="120" y="540" width="130" height="22" rx="11" fill="#8250df" fill-opacity="0.08" stroke="#8250df" stroke-width="0.6"/>
  <text x="185" y="555" text-anchor="middle" class="lane" fill="#8250df">reverse proxy</text>

  <rect x="340" y="540" width="110" height="22" rx="11" fill="#1a7f37" fill-opacity="0.08" stroke="#1a7f37" stroke-width="0.6"/>
  <text x="395" y="555" text-anchor="middle" class="lane" fill="#1a7f37">metrics pull</text>

  <rect x="540" y="540" width="120" height="22" rx="11" fill="#1a7f37" fill-opacity="0.08" stroke="#1a7f37" stroke-width="0.6"/>
  <text x="600" y="555" text-anchor="middle" class="lane" fill="#1a7f37">OTel push</text>

  <rect x="750" y="540" width="72" height="22" rx="11" fill="#1a7f37" fill-opacity="0.08" stroke="#1a7f37" stroke-width="0.6"/>
  <text x="786" y="555" text-anchor="middle" class="lane" fill="#1a7f37">logs</text>

  <!-- Reverse proxy connectors -->
  <line x1="185" y1="492" x2="185" y2="504" stroke="#8250df" stroke-width="1.5" stroke-dasharray="3 2"/>
  <line x1="185" y1="582" x2="185" y2="600" stroke="#8250df" stroke-width="1.5" stroke-dasharray="3 2" marker-end="url(#arr-p)"/>

  <!-- Metrics pull connectors (juul pulls from cherryblossom) -->
  <line x1="395" y1="492" x2="395" y2="504" stroke="#1a7f37" stroke-width="1.5" stroke-dasharray="3 2"/>
  <line x1="395" y1="582" x2="395" y2="600" stroke="#1a7f37" stroke-width="1.5" stroke-dasharray="3 2" marker-end="url(#arr-g)"/>

  <!-- OTel push connectors (cherryblossom pushes to juul) -->
  <line x1="600" y1="600" x2="600" y2="582" stroke="#1a7f37" stroke-width="1.5" stroke-dasharray="3 2" marker-end="url(#arr-g)"/>
  <line x1="600" y1="504" x2="600" y2="492" stroke="#1a7f37" stroke-width="1.5" stroke-dasharray="3 2"/>

  <!-- Logs connectors (cherryblossom pushes to juul) -->
  <line x1="786" y1="600" x2="786" y2="582" stroke="#1a7f37" stroke-width="1.5" stroke-dasharray="3 2" marker-end="url(#arr-g)"/>
  <line x1="786" y1="504" x2="786" y2="492" stroke="#1a7f37" stroke-width="1.5" stroke-dasharray="3 2"/>

  <!-- ======================== CHERRYBLOSSOM ======================== -->
  <rect x="24" y="608" width="1052" height="540" rx="8" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1"/>
  <text x="48" y="636" class="nt">cherryblossom</text>
  <text x="210" y="636" class="sub" font-size="12">on-prem · Arch Linux · NVIDIA GPU</text>

  <!-- STACK: infra -->
  <rect x="40" y="650" width="1020" height="186" rx="6" fill="none" stroke="#d0d7de" stroke-width="1"/>
  <text x="56" y="666" class="stack">infra</text>

  <!-- cherryblossom-docker Tailscale container -->
  <rect x="52" y="674" width="996" height="150" rx="5" fill="url(#tsg)" stroke="#0969da" stroke-width="0.8" stroke-dasharray="4 2"/>
  <text x="68" y="694" class="tsl">cherryblossom-docker</text>
  <text x="252" y="694" class="sub">Tailscale container · TS_SERVE_CONFIG</text>

  <rect x="68" y="704" width="220" height="26" rx="4" fill="#ffffff" stroke="#0969da" stroke-width="0.7"/>
  <text x="178" y="722" text-anchor="middle" class="port">:8096 → jellyfin</text>

  <rect x="302" y="704" width="220" height="26" rx="4" fill="#ffffff" stroke="#0969da" stroke-width="0.7"/>
  <text x="412" y="722" text-anchor="middle" class="port">:9091 → gluetun</text>

  <rect x="536" y="704" width="260" height="26" rx="4" fill="#ffffff" stroke="#0969da" stroke-width="0.7"/>
  <text x="666" y="722" text-anchor="middle" class="port">:9100 → node-exporter</text>

  <rect x="68" y="738" width="220" height="26" rx="4" fill="#ffffff" stroke="#0969da" stroke-width="0.7"/>
  <text x="178" y="756" text-anchor="middle" class="port">:9101 → cAdvisor</text>

  <rect x="302" y="738" width="260" height="26" rx="4" fill="#ffffff" stroke="#0969da" stroke-width="0.7"/>
  <text x="432" y="756" text-anchor="middle" class="port">:9594 → jellyfin-exp</text>

  <rect x="576" y="738" width="220" height="26" rx="4" fill="#ffffff" stroke="#0969da" stroke-width="0.7"/>
  <text x="686" y="756" text-anchor="middle" class="port">:9901 → envoy</text>

  <rect x="68" y="772" width="260" height="26" rx="4" fill="#ffffff" stroke="#0969da" stroke-width="0.7"/>
  <text x="198" y="790" text-anchor="middle" class="port">:19091 → tx-exporter</text>

  <rect x="536" y="772" width="180" height="26" rx="4" fill="#ffffff" stroke="#d0d7de"/>
  <text x="626" y="790" text-anchor="middle" class="t">Watchtower</text>

  <!-- STACK: media -->
  <rect x="40" y="850" width="490" height="90" rx="6" fill="none" stroke="#d0d7de" stroke-width="1"/>
  <text x="56" y="866" class="stack">media</text>

  <rect x="56" y="876" width="210" height="48" rx="4" fill="#ffffff" stroke="#d0d7de"/>
  <text x="161" y="905" text-anchor="middle" class="t">Jellyfin</text>

  <rect x="282" y="876" width="230" height="48" rx="4" fill="#ffffff" stroke="#d0d7de"/>
  <text x="397" y="905" text-anchor="middle" class="t">jellyfin-exporter</text>

  <!-- STACK: torrenting -->
  <rect x="548" y="850" width="512" height="90" rx="6" fill="none" stroke="#d0d7de" stroke-width="1"/>
  <text x="564" y="866" class="stack">torrenting</text>

  <!-- Mullvad VPN tunnel envelope -->
  <rect x="558" y="874" width="340" height="56" rx="5" fill="#bc4c00" fill-opacity="0.04" stroke="#bc4c00" stroke-width="0.8" stroke-dasharray="4 2"/>
  <text x="908" y="888" fill="#bc4c00" class="sub" font-size="9">Mullvad VPN</text>
  <text x="908" y="900" fill="#bc4c00" class="sub" font-size="9">WireGuard tunnel</text>

  <rect x="568" y="880" width="154" height="44" rx="4" fill="#ffffff" stroke="#d0d7de"/>
  <text x="645" y="902" text-anchor="middle" class="t">Gluetun</text>
  <text x="645" y="916" text-anchor="middle" class="sub">kill switch</text>

  <rect x="732" y="880" width="154" height="44" rx="4" fill="#ffffff" stroke="#d0d7de"/>
  <text x="809" y="908" text-anchor="middle" class="t">Transmission</text>

  <rect x="908" y="886" width="140" height="34" rx="4" fill="#ffffff" stroke="#d0d7de"/>
  <text x="978" y="908" text-anchor="middle" class="t" font-size="11">tx-exporter</text>

  <!-- STACK: ai -->
  <rect x="40" y="954" width="490" height="60" rx="6" fill="none" stroke="#d0d7de" stroke-width="1"/>
  <text x="56" y="970" class="stack">ai</text>

  <rect x="56" y="980" width="140" height="28" rx="4" fill="#ffffff" stroke="#d0d7de"/>
  <text x="126" y="999" text-anchor="middle" class="t">Ollama</text>

  <rect x="210" y="980" width="140" height="28" rx="4" fill="#ffffff" stroke="#d0d7de"/>
  <text x="280" y="999" text-anchor="middle" class="t">Envoy</text>

  <rect x="364" y="980" width="150" height="28" rx="4" fill="#ffffff" stroke="#d0d7de"/>
  <text x="439" y="999" text-anchor="middle" class="t">PicoClaw</text>

  <!-- STACK: monitoring -->
  <rect x="548" y="954" width="512" height="60" rx="6" fill="none" stroke="#d0d7de" stroke-width="1"/>
  <text x="564" y="970" class="stack">monitoring</text>

  <rect x="564" y="980" width="120" height="28" rx="4" fill="#ffffff" stroke="#d0d7de"/>
  <text x="624" y="999" text-anchor="middle" class="t">node-exp.</text>

  <rect x="696" y="980" width="120" height="28" rx="4" fill="#ffffff" stroke="#d0d7de"/>
  <text x="756" y="999" text-anchor="middle" class="t">cAdvisor</text>

  <rect x="828" y="980" width="108" height="28" rx="4" fill="#ffffff" stroke="#d0d7de"/>
  <text x="882" y="999" text-anchor="middle" class="t" font-size="11">net-exp.*</text>

  <rect x="948" y="980" width="100" height="28" rx="4" fill="#ffffff" stroke="#d0d7de"/>
  <text x="998" y="999" text-anchor="middle" class="t" font-size="10">OTel Coll.</text>

  <!-- STACK: logging -->
  <rect x="40" y="1028" width="490" height="50" rx="6" fill="none" stroke="#d0d7de" stroke-width="1"/>
  <text x="56" y="1044" class="stack">logging (ships to juul)</text>

  <rect x="56" y="1054" width="160" height="20" rx="4" fill="#ffffff" stroke="#d0d7de"/>
  <text x="136" y="1069" text-anchor="middle" class="t" font-size="11">Promtail</text>

  <!-- footnotes -->
  <text x="48" y="1108" class="sub">* net-exp. uses host networking; its OTel Collector sidecar (also host networking) pushes metrics</text>
  <text x="48" y="1124" class="sub">  to VictoriaMetrics via OTLP over the Tailscale overlay</text>
  <text x="48" y="1154" class="sub">Host Tailscale daemon on each node provides SSH and management access</text>
  <text x="48" y="1170" class="sub">Zero application or metrics ports exposed on either host</text>
</svg>
