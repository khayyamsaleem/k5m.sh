<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 980" font-family="'SF Mono', 'Fira Code', 'Cascadia Code', monospace">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#484f58"/>
    </marker>
    <marker id="arr-b" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#58a6ff"/>
    </marker>
    <marker id="arr-p" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#d2a8ff"/>
    </marker>
    <linearGradient id="tsg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#58a6ff" stop-opacity="0.03"/>
    </linearGradient>
  </defs>

  <style>
    text { font-size: 11.5px; fill: #c9d1d9; }
    .t { font-size: 12px; font-weight: bold; fill: #e6edf3; }
    .sub { font-size: 10px; fill: #7d8590; }
    .port { font-size: 10px; fill: #58a6ff; }
    .nt { font-size: 15px; font-weight: bold; fill: #e6edf3; }
    .tsl { font-size: 11px; font-weight: bold; fill: #58a6ff; }
    .stack { font-size: 9px; fill: #484f58; text-transform: uppercase; letter-spacing: 1px; }
  </style>

  <!-- background -->
  <rect width="780" height="980" rx="10" fill="#0d1117"/>

  <!-- Internet -->
  <text x="390" y="24" text-anchor="middle" fill="#7d8590" font-size="12">Internet</text>
  <line x1="390" y1="30" x2="390" y2="52" stroke="#484f58" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ======================== JUUL ======================== -->
  <rect x="20" y="55" width="740" height="370" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="40" y="80" class="nt">juul</text>
  <text x="82" y="80" class="sub" font-size="11">DigitalOcean VPS</text>

  <!-- STACK: networking -->
  <rect x="35" y="90" width="360" height="90" rx="5" fill="none" stroke="#21262d" stroke-width="1"/>
  <text x="48" y="104" class="stack">networking</text>

  <!-- juul-docker Tailscale container -->
  <rect x="45" y="108" width="340" height="62" rx="5" fill="url(#tsg)" stroke="#58a6ff" stroke-width="0.8" stroke-dasharray="4 2"/>
  <text x="58" y="126" class="tsl">juul-docker</text>
  <text x="148" y="126" class="sub">Tailscale container</text>

  <rect x="58" y="134" width="94" height="28" rx="3" fill="#1c2128" stroke="#30363d"/>
  <text x="105" y="153" text-anchor="middle" class="t">Traefik</text>

  <rect x="164" y="134" width="210" height="28" rx="3" fill="#1c2128" stroke="#58a6ff" stroke-width="0.7"/>
  <text x="269" y="148" text-anchor="middle" class="port">TCP :3100 --> Loki</text>
  <text x="269" y="158" text-anchor="middle" class="sub">log ingestion from cherryblossom</text>

  <!-- STACK: monitoring -->
  <rect x="35" y="190" width="520" height="90" rx="5" fill="none" stroke="#21262d" stroke-width="1"/>
  <text x="48" y="204" class="stack">monitoring</text>

  <rect x="45" y="210" width="160" height="32" rx="3" fill="#1c2128" stroke="#30363d"/>
  <text x="125" y="231" text-anchor="middle" class="t">VictoriaMetrics</text>

  <rect x="215" y="210" width="100" height="32" rx="3" fill="#1c2128" stroke="#30363d"/>
  <text x="265" y="231" text-anchor="middle" class="t">Grafana</text>

  <rect x="325" y="210" width="100" height="32" rx="3" fill="#1c2128" stroke="#30363d"/>
  <text x="375" y="231" text-anchor="middle" class="t">node-exp.</text>

  <rect x="435" y="210" width="110" height="32" rx="3" fill="#1c2128" stroke="#30363d"/>
  <text x="490" y="231" text-anchor="middle" class="t">cAdvisor</text>

  <rect x="45" y="248" width="160" height="24" rx="3" fill="#1c2128" stroke="#30363d"/>
  <text x="125" y="265" text-anchor="middle" class="t">tailscale-exporter</text>

  <!-- STACK: logging -->
  <rect x="35" y="290" width="250" height="50" rx="5" fill="none" stroke="#21262d" stroke-width="1"/>
  <text x="48" y="304" class="stack">logging</text>

  <rect x="45" y="310" width="100" height="24" rx="3" fill="#1c2128" stroke="#30363d"/>
  <text x="95" y="327" text-anchor="middle" class="t">Loki</text>

  <rect x="155" y="310" width="120" height="24" rx="3" fill="#1c2128" stroke="#30363d"/>
  <text x="215" y="327" text-anchor="middle" class="t">Promtail</text>

  <!-- STACK: ci -->
  <rect x="295" y="290" width="260" height="50" rx="5" fill="none" stroke="#21262d" stroke-width="1"/>
  <text x="308" y="304" class="stack">ci</text>

  <rect x="305" y="310" width="110" height="24" rx="3" fill="#1c2128" stroke="#30363d"/>
  <text x="360" y="327" text-anchor="middle" class="t">Jenkins</text>

  <rect x="425" y="310" width="120" height="24" rx="3" fill="#1c2128" stroke="#30363d"/>
  <text x="485" y="327" text-anchor="middle" class="t">OTel Collector</text>

