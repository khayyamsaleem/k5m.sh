  <rect x="570" y="90" width="180" height="104" rx="5" fill="#1c2128" stroke="#30363d"/>
  <text x="586" y="109" class="t" font-size="11">Legend</text>
  <line x1="586" y1="122" x2="614" y2="122" stroke="#58a6ff" stroke-width="2" stroke-dasharray="5 3"/>
  <text x="620" y="126" class="sub">Tailscale tunnel</text>
  <line x1="586" y1="140" x2="614" y2="140" stroke="#3fb950" stroke-width="1.5" stroke-dasharray="3 2"/>
