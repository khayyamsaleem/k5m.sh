name: Hugo Build Validation

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Hugo
        uses: gohugoio/setup-hugo@v1
        with:
          extended: true

      - name: Build site
        run: hugo

      - name: Validate build success
        run: |
          if [ ! -d "public" ]; then
            echo "Hugo build failed - public directory not generated"
            exit 1
          fi
          echo "Hugo build successful!"
